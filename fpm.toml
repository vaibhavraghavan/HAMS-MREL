# This file contains the recipe to build HAMS-MREL
#
# Open the link below for to see a complete list of options
# and configurations that can be defined in this file 
# https://fpm.fortran-lang.org/spec/manifest.html

# Define project properties
name = "HAMS-MREL"
version = "0.0.0"

# The automatic discovery recursively searches the app, example, and test directories 
# for program definitions and declares them as executable, example, and test targets, respectively.
[build]
auto-executables = false
auto-examples = false
auto-tests = false

# Define an executable called hamsmrel.
[[executable]]
name = "hamsmrel"

# Tell fpm where the source files are. 
# fpm will automatically compile all the Fortran files in source-dir 
source-dir = "src"

# Tell fpm which file is the entry point (or "main file") of the application
main = "HAMS_Prog.f90"

# Tell fpm to build with OpenMP
[dependencies]
openmp = "*"

# We define two test executables, one for unit tests and another for integration tests
# This is so we can run both types of tests separately.
[[test]]
name = "integration-tester"
main = "integration_tester.f90"

[[test]]
name = "unit-tester"
main = "unit_tester.f90"

[test.dependencies]
test-drive = { git = "https://github.com/fortran-lang/test-drive"}